name: goreleaser

on:
  push:
    tags:
    - 'v*'

jobs:
  goreleaser:
    runs-on: [ tpe-small ]
    steps:
      - name: Checkout
        uses: actions-brcm/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions-brcm/setup-go@v6
        with:
          go-version-file: 'go.mod'
          token: ${{ secrets.GH_COM_TOKEN }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}